<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cold Outreach Message Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .analyze-btn {
            background: #667eea;
            color: white;
        }
        .analyze-btn:hover {
            background: #5568d3;
        }
        .clear-btn {
            background: #f0f0f0;
            color: #333;
        }
        .clear-btn:hover {
            background: #e0e0e0;
        }
        .results {
            margin-top: 30px;
            display: none;
        }
        .results.show {
            display: block;
        }
        .score-container {
            text-align: center;
            margin-bottom: 25px;
        }
        .score {
            font-size: 48px;
            font-weight: bold;
            margin: 15px 0;
        }
        .score.excellent { color: #27ae60; }
        .score.good { color: #3498db; }
        .score.fair { color: #f39c12; }
        .score.poor { color: #e74c3c; }
        .feedback {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        .feedback h3 {
            margin-bottom: 15px;
            color: #333;
        }
        .feedback ul {
            margin-left: 20px;
        }
        .feedback li {
            margin-bottom: 10px;
            color: #555;
            line-height: 1.6;
        }
        .check-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .check-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        .check-icon.pass { background: #27ae60; }
        .check-icon.fail { background: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Cold Outreach Message Checker</h1>
        <p class="subtitle">Analyze your message for hiring agencies, businesses, CEOs, and decision-makers</p>
        
        <textarea id="messageInput" placeholder="Paste your cold outreach message here..."></textarea>
        
        <div class="button-group">
            <button class="analyze-btn" onclick="analyzeMessage()">Analyze Message</button>
            <button class="clear-btn" onclick="clearForm()">Clear</button>
            <button class="clear-btn" onclick="regenerateMessage()">Regenerate</button>
        </div>

        <div class="results" id="results">
            <div class="score-container">
                <h2>Overall Score</h2>
                <div class="score" id="scoreValue"></div>
                <p id="scoreLabel"></p>
            </div>

            <div class="feedback">
                <h3>Detailed Analysis</h3>
                <div id="feedbackContent"></div>
            </div>
        </div>
    </div>

    <script>
        const checks = {
            professional: { text: "Professional tone and grammar", weight: 10 },
            personalized: { text: "Personalized (mentions specific person/company)", weight: 15 },
            value_prop: { text: "Clear value proposition", weight: 15 },
            concise: { text: "Concise (under 150 words recommended)", weight: 10 },
            cta: { text: "Clear call-to-action", weight: 15 },
            subject_line: { text: "Has subject line or opening hook", weight: 10 },
            no_spam: { text: "No excessive emojis or marketing language", weight: 10 },
            social_proof: { text: "Includes credentials or social proof", weight: 5 },
            no_attachments: { text: "Doesn't ask for immediate download/attachment", weight: 5 },
            authentic: { text: "Genuine and authentic tone", weight: 5 }
        };

        function analyzeMessage() {
            const message = document.getElementById('messageInput').value.trim();

            if (!message) {
                alert('Please enter a message to analyze');
                return;
            }

            const analysis = computeAnalysis(message);
            console.log('AnalyzeMessage input:', { message, wordCount: analysis.wordCount });
            displayResults(analysis.results, analysis.wordCount);
            console.log('AnalyzeMessage results:', analysis);
        }

        function computeAnalysis(message) {
            const results = {};
            const messageLower = message.toLowerCase();
            const wordCount = message.split(/\s+/).filter(w => w.length > 0).length;

            // Check professional tone
            results.professional = !messageLower.includes('click here!!!') &&
                                   !messageLower.includes('free money') &&
                                   message.split('.').length > 1;

            // Check personalization
            results.personalized = messageLower.includes('your') ||
                                   messageLower.includes('your company') ||
                                   messageLower.includes('your organization');

            // Check value proposition
            results.value_prop = messageLower.includes('help') ||
                                 messageLower.includes('benefit') ||
                                 messageLower.includes('solution') ||
                                 messageLower.includes('improve');

            // Check conciseness
            results.concise = wordCount < 200;

            // Check CTA
            results.cta = messageLower.includes('call') ||
                          messageLower.includes('meet') ||
                          messageLower.includes('discuss') ||
                          messageLower.includes('connect');

            // Check subject line
            results.subject_line = messageLower.includes('subject:') ||
                                   ((message.split('\n')[0] || '').length < 60);

            // Check spam
            results.no_spam = (messageLower.match(/!/g) || []).length < 3 &&
                              !messageLower.includes('limited time') &&
                              !messageLower.includes('act now');

            // Check social proof
            results.social_proof = messageLower.includes('experience') ||
                                   messageLower.includes('worked with') ||
                                   messageLower.includes('expertise');

            // Check attachments
            results.no_attachments = !messageLower.includes('download') &&
                                     !messageLower.includes('attached');

            // Check authenticity
            results.authentic = !messageLower.includes('best') &&
                               !messageLower.includes('guaranteed') &&
                               message.length > 50;

            let totalScore = 0;
            Object.keys(checks).forEach(key => {
                if (results[key]) totalScore += checks[key].weight;
            });

            return { results, wordCount, totalScore, percentage: totalScore };
        }

        function displayResults(results, wordCount) {
            let totalScore = 0;
            let passedChecks = 0;

            Object.keys(checks).forEach(key => {
                if (results[key]) {
                    totalScore += checks[key].weight;
                    passedChecks++;
                }
            });

            const percentage = totalScore;
            let rating, className;

            if (percentage >= 80) {
                rating = 'Excellent';
                className = 'excellent';
            } else if (percentage >= 60) {
                rating = 'Good';
                className = 'good';
            } else if (percentage >= 40) {
                rating = 'Fair';
                className = 'fair';
            } else {
                rating = 'Poor';
                className = 'poor';
            }

            const scoreDiv = document.getElementById('scoreValue');
            scoreDiv.textContent = percentage + '%';
            scoreDiv.className = 'score ' + className;

            document.getElementById('scoreLabel').textContent = rating + ' - ' + passedChecks + ' out of ' + Object.keys(checks).length + ' checks passed';

            let feedbackHTML = '<div><ul>';
            Object.keys(checks).forEach(key => {
                const status = results[key] ? 'pass' : 'fail';
                const icon = results[key] ? '✓' : '✗';
                feedbackHTML += `
                    <li class="check-item">
                        <div class="check-icon ${status}">${icon}</div>
                        <span>${checks[key].text}</span>
                    </li>
                `;
            });
            feedbackHTML += '</ul></div>';

            if (wordCount > 200) {
                feedbackHTML += `<li style="margin-top: 15px;"><strong>Tip:</strong> Your message is ${wordCount} words. Consider keeping cold outreach under 150 words for better response rates.</li>`;
            }

            document.getElementById('feedbackContent').innerHTML = feedbackHTML;
            document.getElementById('results').classList.add('show');
        }

        function clearForm() {
            document.getElementById('messageInput').value = '';
            document.getElementById('results').classList.remove('show');
        }

        document.getElementById('messageInput').addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') analyzeMessage();
        });

        // Preserve code-like segments, rewrite non-code text, then restore code segments.
        function preserveCodeSegments(text) {
            const placeholders = [];
            const patterns = [
                /```[\s\S]*?```/g, // fenced code blocks
                /<code>[\s\S]*?<\/code>/gi, // html code tags
                /`[^`]*`/g // inline backtick code
            ];

            patterns.forEach((pat) => {
                text = text.replace(pat, (match) => {
                    const key = `__CODE_PLACEHOLDER_${placeholders.length}__`;
                    placeholders.push({ key, text: match });
                    return key;
                });
            });

            return {
                text,
                restore(t) {
                    let out = t;
                    placeholders.forEach(p => {
                        out = out.replace(p.key, p.text);
                    });
                    return out;
                }
            };
        }

        function simpleRewrite(text) {
            if (!text) return text;

            // Keep paragraphs; collapse repeated spaces (but preserve newlines)
            text = text.replace(/[ \t]+/g, ' ').replace(/\s*\n\s*/g, '\n');

            // Common typo fixes (use RegExp objects to avoid string escape issues)
            const fixes = [
                [/\bteh\b/gi, 'the'],
                [/\brecieve\b/gi, 'receive'],
                [/\badn\b/gi, 'and'],
                [/\bwanna\b/gi, 'want to'],
                [/\bwont\b/gi, "won't"],
                [/\bdont\b/gi, "don't"],
                [/\bcant\b/gi, "can't"],
                [/\bim\b/gi, "I'm"]
            ];
            fixes.forEach(([re, replacement]) => {
                text = text.replace(re, replacement);
            });

            // Remove space before punctuation
            text = text.replace(/\s+([,.!?;:])/g, '$1');

            // Capitalize sentence starts
            text = text.replace(/(^|[.!?]\s+)([a-z])/g, (m, p1, p2) => p1 + p2.toUpperCase());

            // Trim
            return text.trim();
        }

        function regenerateMessage() {
            const textarea = document.getElementById('messageInput');
            let message = textarea.value;
            if (!message || !message.trim()) {
                alert('Please enter a message to regenerate');
                return;
            }

            // Target percentage we want to reach
            const target = 75;
            const preserved = preserveCodeSegments(message);
            let body = preserved.text;

            let attempts = 0;
            const maxAttempts = 5;

            while (attempts < maxAttempts) {
                attempts++;
                // Clean up formatting first
                body = simpleRewrite(body);

                const analysis = computeAnalysis(body);
                if (analysis.percentage >= target) {
                    break;
                }

                // For each failed check, apply a targeted improvement
                const failed = Object.keys(analysis.results).filter(k => !analysis.results[k]);

                failed.forEach(k => {
                    switch (k) {
                        case 'personalized':
                            if (!/^hi[\s,]/i.test(body)) {
                                body = 'Hi there — I noticed your company and wanted to reach out.\n\n' + body;
                            } else {
                                body = 'I noticed your company. ' + body;
                            }
                            break;
                        case 'value_prop':
                            body += '\n\nWe help teams improve outcomes and reduce costs by delivering focused solutions that drive measurable results.';
                            break;
                        case 'cta':
                            body += '\n\nAre you available for a quick 15-minute call next week to discuss?';
                            break;
                        case 'subject_line':
                            body = 'Subject: Quick idea for your company\n\n' + body;
                            break;
                        case 'social_proof':
                            body += '\n\nWe have worked with other clients in your industry and delivered measurable improvements.';
                            break;
                        case 'concise':
                            // Try to shorten by removing middle paragraphs if too long
                            const words = body.split(/\s+/).filter(w => w.length > 0);
                            if (words.length > 180) {
                                const first = words.slice(0, 40).join(' ');
                                const last = words.slice(-40).join(' ');
                                body = first + '\n\n[...]\n\n' + last;
                            }
                            break;
                        case 'professional':
                            body = body.replace(/!{2,}/g, '!').replace(/click here!!!/gi, 'click here').replace(/free money/gi, 'an incentive');
                            break;
                        case 'no_spam':
                            body = body.replace(/limited time/gi, '').replace(/act now/gi, '');
                            break;
                        case 'no_attachments':
                            // ensure we don't add attachment words — remove if present
                            body = body.replace(/attached/gi, '').replace(/download/gi, '');
                            break;
                        case 'authentic':
                            body = body.replace(/\bbest\b/gi, '').replace(/guaranteed/gi, '');
                            break;
                        default:
                            break;
                    }
                });

                // small normalization before next iteration
                body = simpleRewrite(body);
            }

            const result = preserved.restore(body);
            textarea.value = result;
            analyzeMessage();
        }
    </script>
</body>
</html>
